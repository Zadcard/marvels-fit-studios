query ListAllClassTypes @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public") {
  classTypes {
    id
    name
    description
    durationInMinutes
    difficultyLevel
    capacity
  }
}

query GetMyUpcomingBookings @auth(level: USER, insecureReason: "This operation is tied to the authenticated user's ID.") {
  bookings(where: {member: {id_expr: "auth.uid"}}, orderBy: [{bookedAt: ASC}]) {
    id
    classSession {
      id
      classType {
        name
        durationInMinutes
      }
      scheduledDateTime
      location
      studio {
        name
      }
    }
    status
    bookedAt
  }
}

mutation BookClassSession($classSessionId: UUID!) @auth(level: USER, insecureReason: "This operation is tied to the authenticated user's ID.") {
  booking_insert(data: {
    classSessionId: $classSessionId,
    memberId_expr: "auth.uid",
    bookedAt_expr: "request.time",
    status: "CONFIRMED"
  })
}

mutation UpdateUserProfile($displayName: String, $phoneNumber: String, $photoUrl: String) @auth(level: USER, insecureReason: "This operation is tied to the authenticated user's ID.") {
  user_update(key: {id_expr: "auth.uid"}, data: {
    displayName: $displayName,
    phoneNumber: $phoneNumber,
    photoUrl: $photoUrl
  })
}