# Netlify config for marvels-fit-studios (Next.js 16 SSR app)
# Docs: https://docs.netlify.com/frameworks/next-js/overview/
#
# Required environment variables (set in Site configuration > Environment
# variables in the Netlify dashboard):
#   AUTH_SECRET                          - generate with `npx auth secret`
#   APP_URL                              - your Netlify site URL, e.g. https://your-site.netlify.app
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
#   SUPABASE_SERVICE_ROLE_KEY
#   CRON_SECRET                          - shared secret for /api/cron/studio-automation
#
# NEXT_PUBLIC_* vars are inlined at BUILD time. After changing any of them,
# trigger "Clear cache and deploy site" so the new values are baked into the
# client bundle.

[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"

[[plugins]]
  package = "@netlify/plugin-nextjs"
