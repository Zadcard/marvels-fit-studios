# Render Blueprint for marvels-fit-studios (Next.js 16 SSR app)
# Docs: https://render.com/docs/blueprint-spec
#
# After deploying, set the `sync: false` secrets in the Render dashboard
# (Environment tab). AUTH_SECRET / CRON_SECRET are generated automatically.
#
# NOTE: NEXT_PUBLIC_* vars are inlined at BUILD time. After changing any of
# them you must trigger a fresh deploy ("Clear build cache & deploy") so the
# new values are baked into the client bundle.
services:
  - type: web
    name: marvels-fit-studios
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /login
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      # --- NextAuth (v5) ---
      # Generates a random secret automatically. This fixes the MissingSecret crash.
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_URL
        value: https://marvels-fit-studios.onrender.com
      - key: APP_URL
        value: https://marvels-fit-studios.onrender.com
      # --- Supabase (fill these in the dashboard) ---
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # --- Cron endpoint auth (used by /api/cron/studio-automation) ---
      - key: CRON_SECRET
        generateValue: true

# The nightly cron in vercel.json is NOT run by Render. If you need it here,
# uncomment the cron job below (it calls the same endpoint AUTH-gated by CRON_SECRET).
# crons:
#   - name: studio-automation
#     runtime: node
#     schedule: "0 3 * * *"
#     buildCommand: npm install
#     startCommand: 'curl -fsS -H "Authorization: Bearer $CRON_SECRET" https://marvels-fit-studios.onrender.com/api/cron/studio-automation'
